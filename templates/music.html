<!DOCTYPE html>
<html>
<head>
    <title>Music - sa.onhills</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        body { background: #0f0f1a; font-family: 'Poppins', sans-serif; color: white; text-align: center; padding: 20px; margin: 0; }
        .navbar { margin-bottom: 30px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 50px; display: inline-block; }
        .navbar a { color: #8f94fb; text-decoration: none; padding: 0 20px; font-weight: bold; }
        
        .upload-card { background: #1c1c2d; padding: 30px; border-radius: 20px; max-width: 400px; margin: 0 auto 40px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .upload-card input { width: 90%; padding: 10px; margin-bottom: 15px; border-radius: 10px; border: none; background: #252538; color: white; }
        .upload-btn { background: linear-gradient(to right, #8f94fb, #4e54c8); border: none; padding: 12px 30px; color: white; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }

        .content-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .item-card { background: #1c1c2d; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        audio { width: 100%; margin: 15px 0; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
        .delete-btn { background: #ff4b5c; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="navbar"><a href="/">← Home</a></div>
    <h1>🎵 Music Vault</h1>

    <div class="upload-card">
        <form method="POST" enctype="multipart/form-data">
            <input type="text" name="username" placeholder="Your name" required>
            <input type="text" name="title" placeholder="Song name" required>
            <input type="file" name="song" accept="audio/*" required>
            <button class="upload-btn">Upload Song 🚀</button>
        </form>
    </div>

    <div class="content-grid">
        {% for s in songs %}
        <div class="item-card">
            <p><b>{{ s[3] }}</b> - <span style="color:#8f94fb;">{{ s[1] }}</span></p>
            <audio controls><source src="{{ url_for('static', filename='uploads/' + s[2]) }}"></audio>
            <form action="/delete_song/{{ s[0] }}" method="POST">
                <input type="hidden" name="username" value="{{ s[3] }}">
                <button class="delete-btn">Delete</button>
            </form>
        </div>
        {% endfor %}
    </div>
</body>
</html>
