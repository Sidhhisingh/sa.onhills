<!DOCTYPE html>
<html>
<head>
    <title>Poetry - sa.onhills</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        body { background: #0f0f1a; font-family: 'Poppins', sans-serif; color: white; text-align: center; padding: 20px; margin: 0; }
        .navbar { margin-bottom: 30px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 50px; display: inline-block; }
        .navbar a { color: #8f94fb; text-decoration: none; padding: 0 20px; font-weight: bold; }

        .post-card { background: #1c1c2d; padding: 30px; border-radius: 20px; max-width: 500px; margin: 0 auto 40px; border: 1px solid #333; }
        textarea { width: 90%; height: 100px; padding: 15px; border-radius: 10px; border: none; background: #252538; color: white; margin-bottom: 15px; font-family: inherit; }
        .post-btn { background: #8f94fb; border: none; padding: 12px 30px; color: white; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }

        .content-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 900px; margin: 0 auto; }
        .item-card { background: #1c1c2d; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: left; position: relative; }
        .poetry-text { font-style: italic; color: #d1d1d1; white-space: pre-wrap; margin: 15px 0; line-height: 1.6; }
        .delete-btn { background: #ff4b5c; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>
    <div class="navbar"><a href="/">← Home</a></div>
    <h1>✍️ Heartfelt Poetry</h1>

    <div class="post-card">
        <form method="POST">
            <input type="text" name="username" placeholder="Your name" style="width:90%; padding:10px; margin-bottom:15px; border-radius:10px; border:none; background:#252538; color:white;" required>
            <textarea name="text" placeholder="Write your poem here... ✍️" required></textarea>
            <button class="post-btn">Post Poetry ✨</button>
        </form>
    </div>

    <div class="content-grid">
        {% for p in data %}
        <div class="item-card">
            <b style="color: #8f94fb;">👤 {{ p[2] }}</b>
            <p class="poetry-text">{{ p[1] }}</p>
            <form action="/delete_poetry/{{ p[0] }}" method="POST">
                <input type="hidden" name="username" value="{{ p[2] }}">
                <button class="delete-btn">Delete</button>
            </form>
        </div>
        {% endfor %}
    </div>
</body>
</html>
