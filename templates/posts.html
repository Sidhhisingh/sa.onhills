<!DOCTYPE html>
<html>
<head>
<title>Posts</title>

</head>
<body>

<h1>💬 Posts</h1>

<!-- POST FORM -->
<form method="POST" enctype="multipart/form-data">
    {% if not session.get('username') %}
        <input type="text" name="username" placeholder="Enter your name" required><br><br>
    {% endif %}

    <input type="text" name="message" placeholder="Write something..."><br><br>

    <input type="file" name="photo"><br><br>
    <input type="file" name="video"><br><br>

    <button type="submit">Post</button>
</form>

<hr>

<!-- POSTS -->
{% for post in posts %}
<div class="post">

    <h3>👤 {{ post[4] }}</h3>

    <p>{{ post[1] }}</p>

    {% if post[2] %}
        <img src="{{ url_for('static', filename='uploads/' + post[2]) }}">
    {% endif %}

    {% if post[3] %}
        <video controls>
            <source src="{{ url_for('static', filename='uploads/' + post[3]) }}">
        </video>
    {% endif %}

    <!-- DELETE -->
    {% if session.get('username') == post[4] %}
    <form action="/delete_post/{{post[0]}}" method="POST">
        <button>Delete</button>
    </form>
    {% endif %}

</div>
{% endfor %}

</body>
</html>
