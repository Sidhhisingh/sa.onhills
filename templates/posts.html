<!DOCTYPE html>
<html>
<head>
<title>Posts</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

    body {
        background: #0f0f1a; /* Dark Theme for all pages */
        font-family: 'Poppins', sans-serif;
        color: white;
        margin: 0;
        padding: 20px;
        text-align: center;
    }

    h1 { color: #fff; margin-bottom: 30px; font-size: 28px; }

    /* Navigation Bar Fix */
    nav, .menu {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 40px;
        background: rgba(255, 255, 255, 0.05);
        padding: 15px;
        border-radius: 50px;
    }

    nav a {
        text-decoration: none;
        color: #8f94fb;
        font-weight: 500;
        transition: 0.3s;
    }

    nav a:hover { color: #fff; }

    /* Content Cards (Photos/Videos/Poetry ke liye) */
    .content-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 25px;
        max-width: 1200px;
        margin: 0 auto;
    }

    .item-card {
        background: #1c1c2d;
        padding: 20px;
        border-radius: 20px;
        border: 1px solid #333;
        box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }

    img, video {
        width: 100%;
        border-radius: 15px;
        margin-bottom: 15px;
    }

    /* Poetry Text Style */
    .poetry-text {
        font-style: italic;
        line-height: 1.6;
        color: #d1d1d1;
        white-space: pre-wrap; /* Poetry ki lines preserve karne ke liye */
    }

    /* Delete Button Fix */
    .delete-btn {
        background: #ff4b5c;
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 13px;
        margin-top: 10px;
        transition: 0.3s;
    }

    .delete-btn:hover { background: #ff0000; }
</style>

</head>
<body>

<h1>💬 Posts</h1>

<!-- POST FORM -->
<form method="POST" enctype="multipart/form-data">
    {% if not session.get('username') %}
        <input type="text" name="username" placeholder="Enter your name" required><br><br>
    {% endif %}

    <input type="text" name="message" placeholder="Write something..."><br><br>

    <input type="file" name="photo"><br><br>
    <input type="file" name="video"><br><br>

    <button type="submit">Post</button>
</form>

<hr>

<!-- POSTS -->
{% for post in posts %}
<div class="post">

    <h3>👤 {{ post[4] }}</h3>

    <p>{{ post[1] }}</p>

    {% if post[2] %}
        <img src="{{ url_for('static', filename='uploads/' + post[2]) }}">
    {% endif %}

    {% if post[3] %}
        <video controls>
            <source src="{{ url_for('static', filename='uploads/' + post[3]) }}">
        </video>
    {% endif %}

    <!-- DELETE -->
    {% if session.get('username') == post[4] %}
    <form action="/delete_post/{{post[0]}}" method="POST">
        <button>Delete</button>
    </form>
    {% endif %}

</div>
{% endfor %}

</body>
</html>
