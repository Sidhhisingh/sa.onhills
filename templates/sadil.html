<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<div class="navbar">
  <div>Sadil 🔒</div>
  <div><a href="/">Home</a></div>
</div>

<div class="section dark">

  <div class="card">
    <form method="POST" action="/upload_private" enctype="multipart/form-data">
      <input type="file" name="file">
      <button>Upload</button>
    </form>
  </div>

  <div class="grid">
    {% for p in data %}
      <div class="card">
        <img src="{{ url_for('static', filename='uploads/' + p[1]) }}" onclick="openImage(this.src)">

        <a href="/pin/{{ p[0] }}">
          <button>📌 Pin</button>
        </a>
      </div>
    {% endfor %}
  </div>

</div>

<!-- FULL SCREEN VIEW -->
<div id="popup" onclick="closeImage()">
  <img id="popup-img">
</div>

<script>
function openImage(src) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popup-img").src = src;
}

function closeImage() {
  document.getElementById("popup").style.display = "none";
}
</script>

<style>
#popup {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
}

#popup img {
  max-width:90%;
  max-height:90%;
}
</style>
