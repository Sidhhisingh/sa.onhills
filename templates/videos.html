<!DOCTYPE html>
<html>
<head>
    <title>Videos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        body { background: #0f0f1a; font-family: 'Poppins', sans-serif; color: white; text-align: center; padding: 20px; }
        .navbar { margin-bottom: 30px; }
        .navbar a { color: #8f94fb; text-decoration: none; border: 1px solid #8f94fb; padding: 5px 15px; border-radius: 20px; }
        
        /* Google Photos style Grid for Videos */
        .content-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 12px; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 10px;
        }
        
        .item-card { 
            background: #1c1c2d; 
            border-radius: 12px; 
            border: 1px solid #333; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        video { 
            width: 100%; 
            height: 160px; /* Fixed height for grid */
            object-fit: cover; 
            background: black;
            cursor: pointer;
        }

        .delete-btn { 
            background: #ff4b5c; 
            color: white; 
            border: none; 
            padding: 6px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 11px;
            font-weight: bold;
        }
        .delete-btn:hover { background: #ff0000; }
    </style>
</head>
<body>
    <div class="navbar"><a href="/">← Home</a></div>
    <h1>🎬 Videos Gallery</h1>

    <div class="content-grid">
        {% for v in data %}
        <div class="item-card">
            <video controls preload="metadata">
                <source src="{{ url_for('static', filename='uploads/' + v[3]) }}">
            </video>
            <form action="/delete_post/{{v[0]}}" method="POST">
                <button class="delete-btn">Delete ❌</button>
            </form>
        </div>
        {% endfor %}
    </div>
</body>
</html>
